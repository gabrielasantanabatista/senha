<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSuite - Segurança Avançada</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

    <main class="app-container">
        
        <header class="app-header">
            <svg class="icon-main" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <h1 class="app-title">CryptoSuite</h1>
            <p class="app-subtitle">Ferramentas profissionais de criptografia e geração de credenciais.</p>
        </header>

        <nav class="tab-navigation">
            <button class="tab-button active" data-tab="gerador">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Gerador de Senhas
            </button>
            <button class="tab-button" data-tab="cripto">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                Mensagens Ocultas
            </button>
        </nav>

        <section id="tab-gerador" class="tab-content active">
            <div class="display-section">
                <label class="section-label">Senha Gerada</label>
                <div class="input-copy-group">
                    <input type="text" id="campo-senha" readonly value="A8x@9Lm#P2Qr">
                    <button id="btn-copiar-senha" class="btn-icon-only" title="Copiar Senha">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>

            <div class="config-card">
                <h2 class="card-title">Parâmetros de Segurança</h2>
                
                <div class="grid-controls">
                    <div class="control-block">
                        <label class="control-label">Comprimento</label>
                        <div class="counter-group">
                            <button class="btn-counter" id="btn-menos">−</button>
                            <span id="tamanho-texto" class="counter-value">12</span>
                            <button class="btn-counter" id="btn-mais">+</button>
                        </div>
                    </div>

                    <div class="control-block">
                        <label class="control-label">Propriedades</label>
                        <div class="checkbox-list">
                            <label class="checkbox-item"><input type="checkbox" class="opcao-check" checked> Maiúsculas</label>
                            <label class="checkbox-item"><input type="checkbox" class="opcao-check" checked> Minúsculas</label>
                            <label class="checkbox-item"><input type="checkbox" class="opcao-check" checked> Números</label>
                            <label class="checkbox-item"><input type="checkbox" class="opcao-check" checked> Símbolos</label>
                        </div>
                    </div>

                    <div class="control-block">
                        <label class="control-label">Análise de Entropia</label>
                        <div class="meter-container">
                            <div class="meter-bar"><div id="barra-forca" class="meter-fill"></div></div>
                            <span id="nivel-texto" class="meter-status">Forte</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-cripto" class="tab-content">
            <div class="config-card">
                <h2 class="card-title">Cifrador de Mensagens (AES)</h2>
                
                <div class="form-group">
                    <label class="control-label">Mensagem Original / Criptografada</label>
                    <textarea id="texto-mensagem" placeholder="Digite sua mensagem privada aqui..."></textarea>
                </div>

                <div class="form-group">
                    <label class="control-label">Chave Secreta (Senha para Desbloqueio)</label>
                    <input type="password" id="chave-secreta" placeholder="Insira a chave de criptografia">
                </div>

                <div class="action-buttons-group">
                    <button id="btn-criptografar" class="btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        Criptografar
                    </button>
                    <button id="btn-descriptografar" class="btn-secondary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9 0"></path></svg>
                        Descriptografar
                    </button>
                </div>

                <div class="display-section" style="margin-top: 25px;">
                    <label class="section-label">Resultado</label>
                    <div class="input-copy-group">
                        <input type="text" id="campo-resultado" readonly placeholder="O resultado aparecerá aqui">
                        <button id="btn-copiar-resultado" class="btn-icon-only" title="Copiar Resultado">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <div id="toast-notificacao" class="toast">Conteúdo copiado com sucesso.</div>

    </main>

    <script src="script.js"></script>
</body>
</html>
